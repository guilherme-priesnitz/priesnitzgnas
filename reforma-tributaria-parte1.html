<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A apresentação completa | Priesnitz &amp; Gnas</title>
<meta name="description" content="Reveja todos os slides da palestra quando quiser.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#002039;--navy-2:#00467D;--sky-3:#CCDAED;--text-soft:#4a5b6b;--bg:#F6F8FB;--line:#e2e8f0;
    --serif:'Merriweather',Georgia,serif;--sans:'Manrope',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  header{background:#fff;border-bottom:1px solid var(--line)}
  header .wrap{max-width:960px;margin:0 auto;padding:0 clamp(18px,4vw,40px);display:flex;align-items:center;height:66px}
  header img{height:28px}
  .stage{min-height:calc(100vh - 66px - 90px);display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 24px}
  .stage-inner{max-width:520px}
  .stage img{width:64px;margin:0 auto 24px;opacity:.85}
  .kicker{font-size:12.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--navy-2);font-weight:600;margin-bottom:16px}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.6vw,34px);line-height:1.25;margin-bottom:16px}
  p{color:var(--text-soft);font-size:16px;margin-bottom:28px}
  .btn{display:inline-block;background:var(--navy-2);color:#fff;font-weight:700;font-size:15px;padding:14px 26px;border-radius:12px;text-decoration:none;transition:background .2s,transform .15s}
  .btn:hover{background:var(--ink);transform:translateY(-2px)}
  footer{background:var(--ink);color:rgba(255,255,255,.6);font-size:12px;text-align:center;padding:26px 0}
</style>
</head>
<body>
<header><div class="wrap"><a href="reforma-tributaria.html"><img src="assets/logo-navy.png" alt="Priesnitz &amp; Gnas"></a></div></header>

<div class="stage"><div class="stage-inner">
  <img src="assets/icon.png" alt="">
  <div class="kicker">Em breve</div>
  <h1>A apresentação completa</h1>
  <p>Reveja todos os slides da palestra quando quiser. Esta ferramenta está sendo finalizada pelo escritório e entra no ar em breve.</p>
  <a class="btn" href="reforma-tributaria.html#ferramentas">← Voltar para as ferramentas</a>
</div></div>

<footer>Priesnitz &amp; Gnas — Advocacia Empresarial · Material da Jornada Empresarial 2026</footer>
</body>
</html>
